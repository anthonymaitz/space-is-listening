name: Notify Portal

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTAL_DISPATCH_TOKEN }}
          repository: anthonymaitz/anthony.maitz.info
          event-type: game-updated
